server {
  listen 8080;
  port_in_redirect off;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

  # Enforced CSP, validated in report-only mode against the search flow
  # (Chrome + Safari) before switching. No report-uri/report-to endpoint yet
  # (TODO), so violations after this point are only visible as breakage —
  # watch Sentry and the browser console after each deploy.
  set $csp "default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' https://ors-proxy.meridianway.workers.dev https://api.open-meteo.com https://nominatim.openstreetmap.org https://photon.komoot.io https://overpass-cache.meridianway.workers.dev https://tiles.stadiamaps.com https://cloud.umami.is https://gateway.umami.is https://o4511568346021888.ingest.de.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy $csp always;

  location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp always;
  }

  location / { try_files $uri $uri/ /index.html; }
}
